<div class="login-wrapper">
  <div class="login-card">

    <h2>Iniciar sesión</h2>
    <p class="subtitle">Accede a tu cuenta para gestionar tus citas</p>

    <form (ngSubmit)="Login()">
      <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="ejemplo@correo.com" required />
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando || cargandoGoogle">
        {{ cargando ? 'Entrando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <div class="divider">
      <span>o</span>
    </div>

    <button class="btn-google" (click)="loginConGoogle()" [disabled]="cargando || cargandoGoogle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.8 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19.1 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.1l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.5C9.9 35.7 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4 5.7l6.2 5.2C41.3 36.2 44 30.5 44 24c0-1.3-.1-2.7-.4-3.9z"/>
      </svg>
      {{ cargandoGoogle ? 'Conectando...' : 'Continuar con Google' }}
    </button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <p class="register-text">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>

  </div>
</div>
